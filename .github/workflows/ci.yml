name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  backend:
    name: Backend lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: findadvisor
          POSTGRES_PASSWORD: findadvisor
          POSTGRES_DB: findadvisor
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U findadvisor -d findadvisor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://findadvisor:findadvisor@localhost:5432/findadvisor
          JWT_SECRET_KEY: ci-test-secret
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://findadvisor:findadvisor@localhost:5432/findadvisor
          JWT_SECRET_KEY: ci-test-secret
          LOG_JSON: "false"
        run: pytest -v

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type-check & build
        working-directory: frontend
        run: npm run build

  docker:
    name: Build Docker images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: findadvisor-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: findadvisor-frontend:ci

      # Pushing to GHCR only happens on main, and only if you want it -
